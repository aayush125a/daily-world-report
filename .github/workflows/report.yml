name: 🌍 Daily World Report

on:
  schedule:
    - cron: '0 6  * * *'   # 6:00 AM UTC — Morning
    - cron: '0 18 * * *'   # 6:00 PM UTC — Evening
  workflow_dispatch:

jobs:
  update-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🌍 Fetch world report
        run: python fetch_report.py

      - name: 📝 Commit & push
        run: |
          git config user.name  "world-report-bot[bot]"
          git config user.email "world-report-bot[bot]@users.noreply.github.com"
          git add REPORT.md
          if git diff --cached --quiet; then
            echo "Nothing changed."
          else
            SLOT=$([ $(date -u +%H) -lt 12 ] && echo "🌅 Morning" || echo "🌆 Evening")
            git commit -m "${SLOT} world report 🌍💹 — $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
            echo "✅ Report committed!"
          fi
