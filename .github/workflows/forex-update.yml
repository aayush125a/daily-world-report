name: 📊 Forex Dashboard Auto-Update

on:
  schedule:
    # 2x daily — exactly at the 2 biggest market opens
    - cron: '0 8  * * *'  # 🇬🇧 London open  — 08:00 UTC (01:45 PM NPT)
    - cron: '0 13 * * *'  # 🇺🇸 New York open — 13:00 UTC (06:45 PM NPT)
  workflow_dispatch:         # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-forex-dashboard:
    runs-on: ubuntu-latest
    name: Fetch Forex Data & Update README

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set Up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: |
          pip install requests pytz

      - name: 📡 Fetch Forex Data & Update README
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        run: |
          python update_forex.py

      - name: ✅ Commit & Push Updated Dashboard
        run: |
          git config --global user.name "forex-bot[bot]"
          git config --global user.email "forex-bot@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "📊 Forex update: $(date +'%Y-%m-%d %H:%M UTC') — prices & session status refreshed"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
